<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tracker de Dinero</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    input, select, button {
      margin: 5px;
      padding: 5px;
    }
    .ingreso { color: green; }
    .gasto { color: red; }
  </style>
</head>
<body>

  <h1>💸 Mi Dinero</h1>

  <div>
    <input type="number" id="amount" placeholder="amount">
    
    <select id="tipo">
      <option value="ingreso">Ingreso</option>
      <option value="gasto">Gasto</option>
    </select>

    <select id="categoria">
      <option value="alimentos">Alimentos</option>
      <option value="impuestos">Impuestos</option>
      <option value="extras">Extras</option>
      <option value="ocio" >Ocio</option>
      <option value="transporte">Transporte</option>
    </select>

    <button onclick="agregarMovimiento()">Agregar</button>
  </div>

  <div>
  <h2>📊 Totales</h2>
    <p>Ingresos: $<span id="ingresos">0</span></p>
    <p>Gastos: $<span id="gastos">0</span></p>
    <p><strong>Balance: $<span id="balance">0</span></strong></p>
    <p>Ingresos Globales: $<span id="ingresosGlobal">0</span></p>
    <p>Gastos Globales: $<span id="gastosGlobal">0</span></p>
    <p><strong>Balance Global: $<span id="balanceGlobal">0</span></strong></p>
    <h2>📋 Transactions</h2>
  </div>

  <div>

    <h3>Filtrar por Categoria</h3>

    <select id="filtroCategoria" onchange="render()">
      <option value="todas">Todas</option>
      <option value="alimentos">Alimentos</option>
      <option value="impuestos">Impuestos</option>
      <option value="extras">Extras</option>
      <option value="ocio">Ocio</option>
      <option value="transporte">Transporte</option>
    </select>

    <select id="filtroTipo" onchange="render()">
      <option value="todos">Todos</option>
      <option value="ingreso">Ingresos</option>
      <option value="gasto">Gastos</option>
    </select>

  </div>  

  <ul id="lista"></ul>

  <script>
    let transactions = [];

    function agregarMovimiento() {
      console.log("VALOR INPUT:", document.getElementById("amount").value);
      const amount = parseFloat(document.getElementById("amount").value);
      const tipo = document.getElementById("tipo").value;
      const categoria = document.getElementById("categoria").value;

      if (!amount || !categoria) {
        alert("Completá los datos");
        return;
      }

      const movimiento = {
        id: Date.now(),
        amount,
        tipo,
        categoria
      };

      transactions.push(movimiento);
      document.getElementById("amount").value = "";

      render();
      guardarDatos();
    }

    function eliminarMovimiento(id) {
      console.log("CLICK", id);
      transactions = transactions.filter(mov => mov.id !== id);

      guardarDatos();
      render();
    }

    function render() {
      console.log("render ejecutado");
      
      const filtro = document.getElementById("filtroCategoria").value;
      console.log("filtro", filtro)
      const filtroTipo = document.getElementById("filtroTipo").value;
      console.log("TIPO:", filtroTipo);
      console.log("filtroTipo:", filtroTipo);
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      let ingresosGlobal = 0;
      let gastosGlobal = 0;
      let ingresosFiltrados = 0;
      let gastosFiltrados = 0;

      let movimientosFiltrados = transactions;

      if (filtro !== "todas") {
        movimientosFiltrados = transactions.filter(mov => mov.categoria === filtro);
      }
      if (filtroTipo !== "todos") {
        movimientosFiltrados = movimientosFiltrados.filter(mov => mov.tipo === filtroTipo);
      }

      transactions.forEach(mov => {
        if (mov.tipo === "ingreso") {
          ingresosGlobal += mov.amount;
        } else {
          gastosGlobal += mov.amount;
        }
      });

      movimientosFiltrados.forEach(mov => {
        console.log("MOV:", mov);
        const li = document.createElement("li");
        li.innerHTML = `
          ${mov.tipo} - $${mov.amount} (${mov.categoria})
          <button onclick="eliminarMovimiento(${mov.id})">❌</button>
        `;
        li.className = mov.tipo;

        lista.appendChild(li);

        if (mov.tipo === "ingreso") {
          ingresosFiltrados += mov.amount;
        } else {
          gastosFiltrados += mov.amount;
        }
      });

      document.getElementById("ingresos").textContent = ingresosFiltrados;
      document.getElementById("gastos").textContent = gastosFiltrados;
      document.getElementById("balance").textContent = ingresosFiltrados - gastosFiltrados;
      document.getElementById("ingresosGlobal").textContent = ingresosGlobal;
      document.getElementById("gastosGlobal").textContent = gastosGlobal;
      document.getElementById("balanceGlobal").textContent = ingresosGlobal - gastosGlobal;
    };

    function guardarDatos(){
      localStorage.setItem("movimientos", JSON.stringify(transactions));
    };

    function cargarDatos() {
      const datos = localStorage.getItem("movimientos");
      console.log("CARGADOS:", transactions);

      if (datos) {
        transactions = JSON.parse(datos);
        transactions = transactions.map(mov => {
          if (!mov.id) {
            return {
              ...mov,
              id: Date.now() + Math.random()
            };
          };

          if (mov.monto && !mov.amount) {
            return {
              ...mov,
              amount: mov.monto
            };
          }
        
          return mov;
        });
      };
    };
    
    
    cargarDatos();
    render();

  </script>

</body>
</html>
