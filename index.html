<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tracker de Dinero</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    input, select, button {
      margin: 5px;
      padding: 5px;
    }
    .ingreso { color: green; }
    .gasto { color: red; }
    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
    }
    .filters div {
      display:flex;
      flex-direction: column;
    }
  </style>

</head>

<body>

  <h1>💸 Mi Dinero</h1>

  <div>
    <input type="number" id="amount" placeholder="amount">
    
    <select id="type">
      <option value="ingreso">Ingreso</option>
      <option value="gasto">Gasto</option>
    </select>

    <select id="category">
      <option value="alimentos">Alimentos</option>
      <option value="impuestos">Impuestos</option>
      <option value="extras">Extras</option>
      <option value="ocio" >Ocio</option>
      <option value="transporte">Transporte</option>
    </select>

    <button onclick="agregarMovimiento()">Agregar</button>
  </div>

  <div>
  <h2>📊 Totales</h2>
    <p>Ingresos: $<span id="ingresos">0</span></p>
    <p>Gastos: $<span id="gastos">0</span></p>
    <p><strong>Balance: $<span id="balance">0</span></strong></p>
    <p>Ingresos Globales: $<span id="totalIncome">0</span></p>
    <p>Gastos Globales: $<span id="totalExpenses">0</span></p>
    <p><strong>Balance Global: $<span id="balanceGlobal">0</span></strong></p>
    <h2>📋 Transactions</h2>
  </div>

  <div>

    <h3>Filtrar por category</h3>

    <label>Type</label>
    <select id="typeFilter" onchange="render()">
       <option value="todos">Todos</option>
       <option value="ingreso">Ingresos</option>
       <option value="gasto">Gastos</option>
    </select>
  </div>

  <div>
    <label>Category</label>
    <select id="categoryFilter" onchange="render()">
     
    </select>

    

  </div>  

  <ul id="lista"></ul>

  <script>
    const categories = {
      ingreso: ["salario", "regalo", "extra"],
      gasto: ["comida", "transporte", "servicios", "ocio", "extra"]
    };
    let transactions = [];
    var editingId = null;

    function agregarMovimiento() {
      const amount = parseFloat(document.getElementById("amount").value);
      const type = document.getElementById("type").value;
      const category = document.getElementById("category").value;

      if (!amount || !category) {
      
        alert("Completá los datos");
        return;
      }

      if (editingId) {
      
        transactions = transactions.map(mov =>
          mov.id === editingId
          ? {...mov, amount, type, category}
          : mov
        );
        editingId = null;
      
      } else {
      
        const movimiento = {
        id: Date.now(),
        amount,
        type,
        category,
        fecha: Date.now()
        };
        transactions.push(movimiento);
        
      };

      document.getElementById("amount").value = "";
      
      saveData();
      render();
    };

    function deleteTransaction(id) {
      //console.log("CLICK", id);
      transactions = transactions.filter(mov => mov.id !== id);
      saveData();
      render();
    }

    function updateCategoryOptions(type){
      const categorySelect = document.getElementById("category");
      categorySelect.innerHTML = "";

      categories[type].forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        categorySelect.appendChild(option);
      });
    }

    function editTransaction(id) {
      const transaction = transactions.find(t => t.id === id);

      document.getElementById("amount").value = transaction.amount;
      document.getElementById("type").value = transaction.type;
      document.getElementById("category").value = transaction.category;

      editingId = id;
      
    }

    function getFilteredTransactions(){
      console.log("FILTER STATE:", {
        type: document.getElementById("typeFilter").value,
        category: document.getElementById("categoryFilter").value
      });
      const filtro = document.getElementById("categoryFilter").value;
      //console.log("filtro", filtro)
      const typeFilter = document.getElementById("typeFilter").value;
      //console.log("type:", typeFilter);
      //console.log("typeFilter:", typeFilter);
      let resultado = transactions;

      if (filtro !== "todas") {
        resultado = resultado.filter(mov => mov.category === filtro);
      }
      if (typeFilter !== "todos") {
        resultado = resultado.filter(mov => mov.type === typeFilter);
      }
      return resultado;
    };

    function calculateTotals(lista) {
      let income = 0;
      let expenses = 0;

      lista.forEach(mov => {
        if (mov.type === "ingreso") {
          income += mov.amount;
        } else {
          expenses += mov.amount;
        }
      });

      return {
        income,
        expenses,
        balance: income - expenses
      };
    }

    function groupByMonth(lista) {
      const grupos = {};

      lista.forEach(mov => {
        const fecha = mov.fecha ? new Date(mov.fecha) : new Date();
        const año = fecha.getFullYear();
        const mes = (fecha.getMonth() + 1).toString().padStart(2, "0");

        const clave =  año + "-" + mes;

       // console.log("FECHA", mov.fecha)
        if (!grupos[clave]) {
          grupos[clave] = [];
        }

        grupos[clave].push(mov);
      });

      return grupos;
    };

    function updateFilterCategories(type) {
      console.log("UPDATING FILTER CATEGORIES WITH: ", type);
      const categoryFilter = document.getElementById("categoryFilter");
      categoryFilter.innerHTML = "";

      const defaultOption = document.createElement("option");
      defaultOption.value = "todas";
      defaultOption.textContent = "Todas";
      categoryFilter.appendChild(defaultOption);

      if (type === "todos") {
        const allCategories = [...new Set([...categories.ingreso, ...categories.gasto])];

        allCategories.forEach(cat => {
          const option = document.createElement("option");
          option.value = cat;
          option.textContent = cat;
          categoryFilter.appendChild(option);
        });
      } else {
        categories[type].forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        categoryFilter.appendChild(option);
        });
      }
    } 

    function render() {
      //console.log("render ejecutado");
      const lista = document.getElementById("lista");
      lista.innerHTML = "";
      
      const filtrados = getFilteredTransactions();
      
      const globalTotals = calculateTotals(transactions);
      const filteredTotals = calculateTotals(filtrados);

      const grupos = groupByMonth(filtrados);

      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = (now.getMonth() + 1).toString().padStart(2, "0");
      const currentKey = currentYear + "-" + currentMonth;

      for (let clave in grupos) {
        const titulo = document.createElement("h3");
        const isCurrentMonth = clave === currentKey;
        titulo.textContent = (isCurrentMonth ? "▼ " : "▶ ") + clave;
        titulo.style.cursor = "pointer";
        lista.appendChild(titulo);

        const container = document.createElement("div");
        titulo.onclick = () => {
          if (container.style.display === "none") {
            container.style.display = "block";
            titulo.textContent = "▼ " + clave;
          } else {
            container.style.display = "none";
            titulo.textContent = "▶ " + clave;
          }
        };

        if (clave !== currentKey) {
          container.style.display = "none";
        }

        grupos[clave].forEach(mov => {
          const li = document.createElement("li");
          li.innerHTML = `
            ${mov.type} - $${mov.amount} (${mov.category})
            <button onclick="editTransaction(${mov.id})">✏️</button>
            <button onclick="deleteTransaction(${mov.id})">❌</button>
          `;
          li.className = mov.type;

          container.appendChild(li);
        });

        lista.appendChild(container);
      }

      

      document.getElementById("ingresos").textContent = filteredTotals.income;
      document.getElementById("gastos").textContent = filteredTotals.expenses;
      document.getElementById("balance").textContent = filteredTotals.balance;

      document.getElementById("totalIncome").textContent = globalTotals.income;
      document.getElementById("totalExpenses").textContent = globalTotals.expenses;
      document.getElementById("balanceGlobal").textContent = globalTotals.balance;
      
    };

    function saveData(){
      localStorage.setItem("movimientos", JSON.stringify(transactions));
    };

    function loadData() {
      const data = localStorage.getItem("movimientos");
      //console.log("CARGADOS:", transactions);

      if (data) {
        transactions = JSON.parse(data);

        transactions = transactions.map(mov => {
          let updatedTransaction = {...mov};

          if (mov.monto && !mov.amount) {
            updatedTransaction.amount = mov.monto;
          }

          if (mov.tipo && !mov.type) {
            updatedTransaction.type = mov.tipo;
          }

          if (mov.categoria && !mov.category) {
            updatedTransaction.category = mov.categoria;
          }

          if (!mov.id) {
            updatedTransaction.id = Date.now() + Math.random();
          }
          
          if (!mov.fecha) {
            updatedTransaction.fecha = Date.now();
          }
          
          if (updatedTransaction.category === "alimentos") {
            updatedTransaction.category = "comida";
          }

          if (updatedTransaction.category === "impuestos") {
              updatedTransaction.category = "servicios";
          }

          if (updatedTransaction.category === "extras") {
              updatedTransaction.category = "extra";
          }


          return updatedTransaction;
        });
      }
    }

   

    document.getElementById("typeFilter").addEventListener("change", (e) => {
      console.log("TYPE FILTER VALUE:", e.target.value);
      const type = e.target.value;
      document.getElementById("categoryFilter").value = "todas";
      updateFilterCategories(type);
      render()
    });

    

    
    loadData();
    updateFilterCategories("todos");
    render();
    
    document.getElementById("type").addEventListener("change", (e) => {
      updateCategoryOptions(e.target.value);
    });
    updateCategoryOptions(document.getElementById("type").value);

  </script>

</body>
</html>
