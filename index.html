<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tracker de Dinero</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    input, select, button {
      margin: 5px;
      padding: 5px;
    }
    .ingreso { color: green; }
    .gasto { color: red; }
  </style>
</head>
<body>

  <h1>💸 Mi Dinero</h1>

  <div>
    <input type="number" id="monto" placeholder="Monto">
    
    <select id="tipo">
      <option value="ingreso">Ingreso</option>
      <option value="gasto">Gasto</option>
    </select>

    <select id="categoria">
      <option value="alimentos">Alimentos</option>
      <option value="impuestos">Impuestos</option>
      <option value="extras">Extras</option>
      <option value="ocio" >Ocio</option>
      <option value="transporte">Transporte</option>
    </select>

    <button onclick="agregarMovimiento()">Agregar</button>
  </div>

  <h2>📊 Totales</h2>
  <p>Ingresos: $<span id="ingresos">0</span></p>
  <p>Gastos: $<span id="gastos">0</span></p>
  <p><strong>Balance: $<span id="balance">0</span></strong></p>

  <h2>📋 Movimientos</h2>

  <div>
    <h3>Filtrar por Categoria</h3>

    <select id="filtroCategoria" onchange="render()">
      <option value="todas">Todas</option>
      <option value="alimentos">Alimentos</option>
      <option value="impuestos">Impuestos</option>
      <option value="extras">Extras</option>
      <option value="ocio">Ocio</option>
      <option value="transporte">Transporte</option>
    </select>
  </div>  
  <ul id="lista"></ul>

  <script>
    let movimientos = [];

    function agregarMovimiento() {
      const monto = parseFloat(document.getElementById("monto").value);
      const tipo = document.getElementById("tipo").value;
      const categoria = document.getElementById("categoria").value;

      if (!monto || !categoria) {
        alert("Completá los datos");
        return;
      }

      const movimiento = {
        id: Date.now(),
        monto,
        tipo,
        categoria
      };

      movimientos.push(movimiento);
      document.getElementById("monto").value = "";

      render();
      guardarDatos();
    }

    function eliminarMovimiento(id) {
      console.log("CLICK", id);
      movimientos = movimientos.filter(mov => mov.id !== id);

      guardarDatos();
      render();
    }

    function render() {
      console.log("render ejecutado");
      
      const filtro = document.getElementById("filtroCategoria").value;
      console.log("filtro", filtro)
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      let ingresos = 0;
      let gastos = 0;

      let movimientosFiltrados = movimientos;

      if (filtro !== "todas") {
        movimientosFiltrados = movimientos.filter(mov => mov.categoria === filtro);
      }

      movimientosFiltrados.forEach(mov => {
        const li = document.createElement("li");
        li.innerHTML = `
          ${mov.tipo} - $${mov.monto} (${mov.categoria})
          <button onclick="eliminarMovimiento(${mov.id})">❌</button>
        `;
        li.className = mov.tipo;

        lista.appendChild(li);

        if (mov.tipo === "ingreso") {
          ingresos += mov.monto;
        } else {
          gastos += mov.monto;
        }
      });

      document.getElementById("ingresos").textContent = ingresos;
      document.getElementById("gastos").textContent = gastos;
      document.getElementById("balance").textContent = ingresos - gastos;
    }

    function guardarDatos(){
      localStorage.setItem("movimientos", JSON.stringify(movimientos));
    }

    function cargarDatos() {
      const datos = localStorage.getItem("movimientos");

      if (datos) {
        movimientos = JSON.parse(datos);
        movimientos = movimientos.map(mov => {
          if (!mov.id) {
            return {
              ...mov,
              id: Date.now() + Math.random()
            };
          }
          return mov;
        });
      }
    }
    
    
    cargarDatos();
    render();

  </script>

</body>
</html>
