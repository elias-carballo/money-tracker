<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tracker de Dinero</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    input, select, button {
      margin: 5px;
      padding: 5px;
    }
    .ingreso { color: green; }
    .gasto { color: red; }
  </style>
</head>
<body>

  <h1>💸 Mi Dinero</h1>

  <div>
    <input type="number" id="amount" placeholder="amount">
    
    <select id="type">
      <option value="ingreso">Ingreso</option>
      <option value="gasto">Gasto</option>
    </select>

    <select id="category">
      <option value="alimentos">Alimentos</option>
      <option value="impuestos">Impuestos</option>
      <option value="extras">Extras</option>
      <option value="ocio" >Ocio</option>
      <option value="transporte">Transporte</option>
    </select>

    <button onclick="agregarMovimiento()">Agregar</button>
  </div>

  <div>
  <h2>📊 Totales</h2>
    <p>Ingresos: $<span id="ingresos">0</span></p>
    <p>Gastos: $<span id="gastos">0</span></p>
    <p><strong>Balance: $<span id="balance">0</span></strong></p>
    <p>Ingresos Globales: $<span id="totalIncome">0</span></p>
    <p>Gastos Globales: $<span id="totalExpenses">0</span></p>
    <p><strong>Balance Global: $<span id="balanceGlobal">0</span></strong></p>
    <h2>📋 Transactions</h2>
  </div>

  <div>

    <h3>Filtrar por category</h3>

    <select id="categoryFilter" onchange="render()">
      <option value="todas">Todas</option>
      <option value="alimentos">Alimentos</option>
      <option value="impuestos">Impuestos</option>
      <option value="extras">Extras</option>
      <option value="ocio">Ocio</option>
      <option value="transporte">Transporte</option>
    </select>

    <select id="typeFilter" onchange="render()">
      <option value="todos">Todos</option>
      <option value="ingreso">Ingresos</option>
      <option value="gasto">Gastos</option>
    </select>

  </div>  

  <ul id="lista"></ul>

  <script>
    let transactions = [];
    let editingId = null;

    function agregarMovimiento() {
      const amount = parseFloat(document.getElementById("amount").value);
      const type = document.getElementById("type").value;
      const category = document.getElementById("category").value;

      if (!amount || !category) {
        alert("Completá los datos");
        return;
      }

      if (editingId) {
        transactions = transactions.map(mov =>
          mov.id === editingId
          ? {...mov, amount, type, category}
          : mov
        );
        editingId = null;
      } else {
        const movimiento = {
        id: Date.now(),
        amount,
        type,
        category
      };

      transactions.push(movimiento);
        
      }


      document.getElementById("amount").value = "";

      render();
      saveData();
    }

    function deleteTransaction(id) {
      console.log("CLICK", id);
      transactions = transactions.filter(mov => mov.id !== id);

      saveData();
      render();
    }

    function editTransaction(id) {
      const transaction = transactions.find(t => t.id === id);

      document.getElementById("amount").value = transaction.amount;
      document.getElementById("type").value = transaction.type;
      document.getElementById("category").value = transaction.category;

      editingId = id;
      console.log("FOUND", transaction);
    };

    function render() {
      console.log("render ejecutado");
      
      const filtro = document.getElementById("categoryFilter").value;
      console.log("filtro", filtro)
      const typeFilter = document.getElementById("typeFilter").value;
      console.log("type:", typeFilter);
      console.log("typeFilter:", typeFilter);
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      let totalIncome = 0;
      let totalExpenses = 0;
      let filteredIncome = 0;
      let filteredExpenses = 0;

      let movimientosFiltrados = transactions;

      if (filtro !== "todas") {
        movimientosFiltrados = transactions.filter(mov => mov.category === filtro);
      }
      if (typeFilter !== "todos") {
        movimientosFiltrados = movimientosFiltrados.filter(mov => mov.type === typeFilter);
      }

      transactions.forEach(mov => {
        if (mov.type === "ingreso") {
          totalIncome += mov.amount;
        } else {
          totalExpenses += mov.amount;
        }
      });

      const grupos = {};

      movimientosFiltrados.forEach(mov => {
        const fecha = mov.fecha ? new Date(mov.fecha) : new Date();
        const año = fecha.getFullYear();
        const mes = (fecha.getMonth() + 1).toString().padStart(2, "0");

        const clave =  año + "-" + mes;

        console.log("FECHA", mov.fecha)
        if (!grupos[clave]) {
          grupos[clave] = [];
        }

        grupos[clave].push(mov);
      });

      for (let clave in grupos) {

        const titulo = document.createElement("h3");
        titulo.textContent = clave;
        lista.appendChild(titulo);

    
        grupos[clave].forEach(mov => {
          const li = document.createElement("li");
          li.innerHTML = `
            ${mov.type} - $${mov.amount} (${mov.category})
            <button onclick="editTransaction(${mov.id})">✏️</button>
            <button onclick="deleteTransaction(${mov.id})">❌</button>
          `;
          li.className = mov.type;

          lista.appendChild(li);

          if (mov.type === "ingreso") {
            filteredIncome += mov.amount;
          } else {
            filteredExpenses += mov.amount;
          }
        });
      }
    
      document.getElementById("ingresos").textContent = filteredIncome;
      document.getElementById("gastos").textContent = filteredExpenses;
      document.getElementById("balance").textContent = filteredIncome - filteredExpenses;
      document.getElementById("totalIncome").textContent = totalIncome;
      document.getElementById("totalExpenses").textContent = totalExpenses;
      document.getElementById("balanceGlobal").textContent = totalIncome - totalExpenses;
    };

    function saveData(){
      localStorage.setItem("movimientos", JSON.stringify(transactions));
    };

    function loadData() {
      const data = localStorage.getItem("movimientos");
      console.log("CARGADOS:", transactions);

      if (data) {
        transactions = JSON.parse(data);
        transactions = transactions.map(mov => {
          let updatedTransaction = {...mov};

          if (mov.monto && !mov.amount) {
            updatedTransaction.amount = mov.monto;
          }

          if (mov.tipo && !mov.type) {
            updatedTransaction.type = mov.tipo;
          }

          if (mov.categoria && !mov.category) {
            updatedTransaction.category = mov.categoria;
          }

          if (!mov.id) {
            updatedTransaction.id = Date.now() + Math.random();
          }
          
          return updatedTransaction;
        });
      };
    };
    
    
    loadData();
    render();

  </script>

</body>
</html>
