<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tracker de Dinero</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    input, select, button {
      margin: 5px;
      padding: 5px;
    }
    .ingreso { color: green; }
    .gasto { color: red; }
    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
    }
    .filters div {
      display:flex;
      flex-direction: column;
    }
  </style>

</head>

<body>

  <h1>💸 Mi Dinero</h1>

  <div>
    <input type="number" id="amount" placeholder="amount">
    
    <select id="type">
      <option value="ingreso">Ingreso</option>
      <option value="gasto">Gasto</option>
    </select>

    <select id="category">
      <option value="alimentos">Alimentos</option>
      <option value="impuestos">Impuestos</option>
      <option value="extras">Extras</option>
      <option value="ocio" >Ocio</option>
      <option value="transporte">Transporte</option>
    </select>

    <button onclick="agregarMovimiento()">Agregar</button>
  </div>

  <div>
  <h2>📊 Totales</h2>
    <p>Ingresos: $<span id="ingresos">0</span></p>
    <p>Gastos: $<span id="gastos">0</span></p>
    <p><strong>Balance: $<span id="balance">0</span></strong></p>
    <p>Ingresos Globales: $<span id="totalIncome">0</span></p>
    <p>Gastos Globales: $<span id="totalExpenses">0</span></p>
    <p><strong>Balance Global: $<span id="balanceGlobal">0</span></strong></p>
    <h2>📋 Transactions</h2>
  </div>

  <div>

    <h3>Filtrar por category</h3>

    <label>Type</label>
    <select id="typeFilter" onchange="render()">
       <option value="todos">Todos</option>
       <option value="ingreso">Ingresos</option>
       <option value="gasto">Gastos</option>
    </select>
  </div>

  <div>
    <label>Category</label>
    <select id="categoryFilter" onchange="render()">
     
    </select>

    

  </div>  

  <ul id="lista"></ul>

  <script type="module" src="js/app.js"></script>

</body>
</html>
